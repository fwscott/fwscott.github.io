<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found | fwscott.com</title>
    <style>
        :root {
            --bg: #071f2f;
            --bg-soft: #0f3447;
            --text: #edf6ff;
            --muted: #b3cde2;
            --accent: #f4b63f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 20%, rgba(244, 182, 63, 0.2), transparent 35%),
                linear-gradient(150deg, var(--bg), var(--bg-soft));
        }

        main {
            width: min(680px, 92vw);
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.08);
        }

        h1 {
            margin: 0 0 0.7rem;
            font-family: Georgia, serif;
            font-size: clamp(1.7rem, 5vw, 2.3rem);
        }

        p {
            margin: 0.35rem 0;
            color: var(--muted);
        }

        a {
            display: inline-block;
            margin-top: 1rem;
            color: #092335;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), #ffce67);
            border-radius: 999px;
            padding: 0.65rem 1rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <main>
        <h1>This page does not exist.</h1>
        <p>The link may be outdated, or the page may have moved.</p>
        <p>Use the homepage or consulting page to continue.</p>
        <a href="/">Go to fwscott.com</a>
    </main>
</body>

</html>
